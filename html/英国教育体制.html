# Education System (Ch7)

## 7.1 Overview

- Education overseen by the **Department for Children, Schools and Families** and the **Department for Business, Innovation and Skills**
- Local authorities implement policy for public education and state schools

### History

- 📖 **Education Act 1902 (1902年教育法案)**：Established a system of new, publicly funded grammar schools and provided government aid for existing ones. It matters as the foundation of state secondary education in Britain.
  - Before 1902: no publicly funded secondary education; students attended private grammar schools or public schools
  - Also began technical training courses for those not academically qualified for grammar schools
- 📖 **Eleven-plus (11-plus, 11+考试)**：Examinations taken at age 11 after primary school that determined placement in a three-track secondary system. It matters for understanding the selective education tradition in Britain.
  - Highest scoring → grammar schools (likely university)
  - Others → modern schools (higher-level elementary, no university) or technical schools (best graduates sometimes admitted to university)
- 📖 **Comprehensive School (综合中学)**：A non-selective secondary school combining grammar, modern, and technical school elements, educating pupils of all abilities. It matters for the democratisation of British education.
  - Purpose: democratise education, do away with early selection, provide equal opportunity
  - Pupils placed in A, B, or C "streams" by aptitude and abilities (streaming)
  - Similar to American high school where ability grouping is called "tracking"
  - 1975 legislation passed to hasten transition to comprehensive system
  - By late 20th century: eleven-plus became defunct; vast majority attended comprehensives

### School Years

- 📖 **Key Stage (关键阶段)**：Defined stages in the National Curriculum with corresponding assessments. It matters for understanding the structure of British schooling.
  - Foundation Stage: Nursery (age 3), Reception (age 4)
  - Key Stage 1: Year 1 (age 5) – Year 2 (age 6/7)
  - Key Stage 2: Year 3 (age 7) – Year 6 (age 10/11)
  - Key Stage 3: Year 7 (age 11) – Year 9 (age 13/14)
  - Key Stage 4 / GCSE: Year 10 (age 14) – Year 11 (age 15/16)
  - Sixth Form / A level: Year 12 (age 16) – Year 13 (age 17/18)

### Two Types of Schools

- 📖 **State School (公立学校)**：Schools financed through national taxation, taking pupils free of charge between ages 3 and 18. Over 93% of UK students attend state schools. It matters for understanding the mainstream education system.
- 📖 **Independent School (独立学校/私立学校)**：Fee-paying schools not run by the government, approximately 7% of English schoolchildren. It matters for understanding the private education sector.
  - Usually chargeable; some are boarding schools
  - Separate sciences (biology, chemistry, physics)
  - Entrance exam (1st form exam) taking the highest 50%
  - May be single-sex

### Public Schools

- 📖 **Public School (公学)**：In British usage, a prestigious, historic, fee-paying school (often boarding) not run by the state. Confusing to non-native speakers because a public school is actually a private school. It matters for understanding British social class and education.
  - Term "public" adopted by Eton: open to the paying public (vs religious schools limited to certain church members)
  - Played an important role in the Victorian social elite
  - Curriculum based on classics and physical activity for upper and upper-middle classes
  - Schools for the gentlemanly elite of Victorian politics, armed forces, and colonial government
  - Discipline maintained by older boys (prefect system)
  - Today: highly selective on academic, financial, and social grounds
  - Recognisably "public" schools found in many Commonwealth countries

## 7.2 Primary and Secondary Education

- 📖 **Compulsory Education (义务教育)**：Education required by law from the term after the fifth birthday to the last Friday in June of the school year in which students turn 16. It matters as the legal framework for schooling in Britain.
  - To be raised: 2013 → age 17; 2015 → age 18
  - School year begins usually 1st September

### Primary Education

- 📖 **Primary Education (小学教育)**：The first years of formal, structured education through infant and junior schools or combined primary schools. It matters as the foundation of formal learning.
  - Foundation Stage 1: Part-time, age 3–4 (preschool/childcare)
  - Foundation Stage 2: Full-time Reception, age 4–5 (infant/primary school)
  - Key Stage 1: Year 1 (age 5–6), Year 2 (age 6–7)
  - Key Stage 2: Year 3 (age 7–8) through Year 6 (age 10–11)
  - Generally begins at age 4–7; division with secondary at about age 12

### Secondary Education

- 📖 **Secondary Education (中学教育)**：Education conducted through secondary schools covering Key Stages 3 and 4, with optional Sixth Form. It matters for the GCSE and A-level pathways.
  - Key Stage 3: Year 7–9 (ages 11–14)
  - Key Stage 4: Year 10–11 (ages 14–16, end of compulsory education)
  - Sixth Form (optional): Year 12–13 (ages 16–18)

### Streaming

- 📖 **Streaming / Setting (能力分组)**：Grouping pupils by ability within schools, especially for mathematics, science and modern languages. It matters for debates about educational equality vs academic excellence.
  - All students study the same subjects: English, Welsh (in Wales), modern foreign languages, geography, history, citizenship, religious education, design technology, music, ICT, drama, PE
  - Vocational subjects also available: hairdressing, construction, woodwork, travel and tourism, business studies
  - Grammar and public schools additionally teach Greek and Latin

### National Curriculum

- 📖 **National Curriculum (国家课程)**：A government-set framework for what state schools in England should teach, introduced in 1992. It matters for ensuring consistency and entitlement across schools.
  - Core subjects: English, mathematics, science (Welsh as core in Welsh-speaking schools)
  - Foundation subjects: design and technology, ICT, history, geography, modern foreign languages, music, art and design, PE, religious education, citizenship
  - State schools required to follow until age 16; independent schools not obliged
  - Northern Ireland follows similar framework (includes Irish language in Irish-speaking schools)

### Examinations

- 📖 **GCSE (General Certificate of Secondary Education, 普通中等教育证书)**：National examinations taken at age 16 after five years of secondary education. It matters as the key qualification at the end of compulsory schooling.
  - Single-subject examination set by independent examination boards
  - Students usually take up to ten GCSEs (including maths and English)
  - After GCSEs: leave schooling, continue to vocational/technical colleges, or take AS/A-levels
- 📖 **A-level (Advanced Level, 高级水平考试)**：Advanced qualifications studied from 16–18, typically 3–4 subjects, required for university entrance. It matters as the main route to higher education.
  - 📖 **AS-level (AS阶段考试)**：Examinations taken after one additional year of study post-GCSE, before completing full A-levels.
- 📖 **SCE (Scottish Certificate of Education, 苏格兰教育证书)**：Scotland's own qualification framework separate from England/Wales/NI, taken at age 15–16 after seven years of primary and four years of secondary education. Recognised throughout the UK as equivalent to GCE A-levels.

### Ofsted

- 📖 **Ofsted (Office for Standards in Education, 英国教育标准局)**：Non-ministerial government department responsible for inspecting state and independent schools in England. It matters for quality assurance in education.
  - Publishes reports of quality of education at each school
  - Schools judged inadequate may be placed in special measures
  - HMCI (Her Majesty's Chief Inspector of Schools) appointed by Order in Council
  - HMI (Her Majesty's Inspectors) provide independent advice to government and parliament
  - Head office: Kingsway, Holborn, central London
  - Northern Ireland: Education and Training Inspectorate
  - Scotland: HM Inspectorate of Education
  - Wales: Estyn

## 7.3 Higher Education

- 📖 **Higher Education (高等教育)**：Education at universities and similar institutions beyond secondary school. It matters for Britain's global academic reputation and social mobility.
  - Strikingly pronounced autonomy from national or local government
  - Universities receive nearly all funding from the state but determine their own curricula
  - Centralised admissions bureau (UCAS): candidates give preferred universities in order
  - Close supervision through tutorial system → most undergraduates complete degree in 3 years (not 4)
  - More specialised than European counterparts: honours degree in one or two subjects
  - ~1.8 million students enrolled; about 1/3 of young people go to higher education at age 18
  - Government target: 50% of 18–30 year olds in higher education by 2010

### Academic Degrees

- 📖 **Bachelor's Degree (学士学位)**：Typical first degree at British universities, typically three years. Students are known as undergraduates. It matters as the standard entry-level qualification.
  - State does not control syllabuses but influences admission procedures
  - Exception: state controls teacher training courses via Ofsted
- 📖 **Master's Degree (硕士学位)**：Postgraduate degree typically taken in one year. It matters for advanced academic and professional qualifications.
- 📖 **Doctoral Degree (博士学位)**：Postgraduate degree typically taken in three years. Not automatically state-financed; admission highly competitive.

### Types of Universities

- 📖 **Oxbridge (牛剑)**：Collective term for the Universities of Oxford and Cambridge. It matters for their long-established elite status, highly selective admissions, and strong cultural influence.
  - Key training grounds for governing and professional elite
  - Access to Oxbridge can amplify existing advantages; widening participation closely watched
- 📖 **Russell Group (罗素集团)**：An association of leading UK research-intensive universities. The label is used as shorthand for research strength, selectivity, and prestige.
- 📖 **Redbrick Universities (红砖大学)**：Historical term for civic universities that expanded in major industrial cities in the late 19th/early 20th centuries. They matter for the rise of modern, urban, professionally oriented higher education.
- 📖 **Polytechnics (理工学院)**：Institutions focused on applied, technical, and vocational higher education. Many later granted university status and became "new universities."
- 📖 **Open University (开放大学)**：A university designed around flexible, often distance/part-time study with open access principles. It matters for broadening participation for adults.
  - Founded 1969; first students enrolled January 1971
  - Open entry policy: previous academic achievements not considered for most undergraduate courses
  - Administration: Walton Hall, Milton Keynes, Buckinghamshire
  - 13 regional centres around the UK; offices in other European countries
  - Over 180,000 students enrolled (including 25,000+ overseas)
  - Largest academic institution in the UK by student number
  - 3+ million students since founding
  - Rated top university in England/Wales for student satisfaction (2005, 2006)

### Student Finance

- 📖 **Student Loans (学生贷款)**：Repayable government-backed finance for tuition and/or living costs, typically repaid after income reaches a threshold. It matters for understanding access to higher education.
- 📖 **Grants (助学金)**：Non-repayable support historically aimed at widening access, later reduced/reshaped.

## 7.4 Further Education

- 📖 **Further Education (FE, 继续教育)**：Post-compulsory education distinct from higher education, at any level above compulsory education from basic training to higher national diploma. It matters for understanding educational pathways beyond age 16 that are not university.
  - Primarily taught in FE colleges (similar to US community colleges)
  - Also includes work-based learning and adult/community learning
  - Colleges include: general FE and tertiary colleges, sixth form colleges, specialist colleges
  - Overseen by Department for Business, Innovation and Skills (since June 2009)
  - Some parts (14–19 year olds) fall within DCSF

## 7.5 Adult Education

- 📖 **Adult Education / Continuing Education / Lifelong Learning (成人教育/终身学习)**：Education offered to students of all ages, including access courses and distance learning. It matters for educational inclusivity.
  - One- or two-year access courses allow adults access to university
  - Open University runs distance learning programme leading to a degree

## Cross-disciplinary Connections

### Education × Social Class

- **Why "public school" means private in Britain**: Schools were "public" in the sense of open to paying pupils beyond a single parish, rather than state-controlled. Over time, these became fee-charging institutions serving social elites, so "public" survived as a historical label.
- **How the class system shows up in educational opportunity**: Family income and cultural capital shape access to high-performing schools, tutoring, and enrichment. Elite fee-paying schools provide powerful networks and social signalling that translate into advantages in higher education and careers.
- **Grammar vs Comprehensive debate**: Tension between **selection/meritocratic sorting** (grammar schools) and **equal access/mixed-ability education** (comprehensives). Supporters argue selection promotes excellence and mobility; critics argue it reproduces inequality and labels children early.
- **Oxbridge's historical status and social impact**: Oxford and Cambridge served as training grounds for the governing and professional elite. Their prestige makes them powerful "gatekeepers" — access to Oxbridge amplifies existing advantages while widening participation efforts indicate social change.

## Exam Focus

### Key Facts (高频填空)

- **Education Act 1902**: established publicly funded grammar schools
- **1992**: National Curriculum introduced
- **Compulsory education**: age 5 to 16 (to be raised to 17 in 2013, 18 in 2015)
- **Over 93%** of students attend state schools
- **~7%** attend independent (private) schools
- **Eleven-plus**: age 11 selection exam for three-track secondary system
- **GCSE**: taken at age 16 after five years of secondary education
- **A-level**: taken at 16–18, required for university entrance
- **Core subjects** (National Curriculum): English, mathematics, science
- **SCE** (Scotland): equivalent to GCE A-levels
- **Bachelor's degree**: typically 3 years
- **Master's degree**: typically 1 year
- **Doctoral degree**: typically 3 years
- **Open University**: founded 1969; first students 1971; 180,000+ students; largest in UK
- **Ofsted**: inspects all state-funded schools in England

### Linking Chains (简答题框架)

- **Chain 1**: Education Act 1902 → publicly funded grammar schools → eleven-plus selection → three-track system (grammar/modern/technical) → criticism of rigidity → comprehensive schools → democratisation of education
- **Chain 2**: Victorian public schools → gentlemanly elite for politics/forces/colonial government → class-based educational access → grammar vs comprehensive debate → social mobility questions
- **Chain 3**: National Curriculum (1992) → core + foundation subjects → state schools must follow → independent schools exempt → quality assurance via Ofsted
- **Chain 4**: GCSE (age 16) → A-level (16–18) → university admission (3-year degree) → Oxbridge/Russell Group selectivity → class and access debates

### Ready-to-use Exam Sentences (可背写高分句型)

- **The comprehensive school was developed to democratise education, do away with early selection procedures, and provide equal opportunity for all children.**
- **In British usage, a "public school" is actually a private, fee-paying institution — confusing to non-native speakers, since a government-run school is called a "state school."**
- **The National Curriculum, introduced in 1992, requires state schools to teach core subjects (English, mathematics and science) and foundation subjects until students reach age 16.**
- **British universities enjoy almost complete autonomy in administration and curriculum determination, despite receiving nearly all their funding from the state.**
