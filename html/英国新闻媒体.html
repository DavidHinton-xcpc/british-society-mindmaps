# News Media (Ch10)

## 10.1 The Press

- 📖 **The Press (新闻界/报刊媒体)**：Britain's newspaper industry, one of the world's oldest, with an almost unparalleled number of outlets. It matters for understanding the diversity and influence of British media.
  - Earliest printed newspaper: *Treve Encountre* (1513)
  - 📖 **The Observer (观察家报)**：Popular Sunday newspaper first published in 1791, the world's oldest national newspaper. It matters for its historical significance and left-liberal editorial stance.
  - 📖 **The Times (泰晤士报)**：Britain's oldest daily newspaper, launched in 1785. It matters as one of the world's most famous and influential papers.
  - 📖 **Fleet Street (舰队街)**：London street that became shorthand for the British national press because many major newspapers were headquartered there. Most have now moved away, but it still symbolises press culture and power. It matters for the historical geography of British journalism.
  - Newspaper printing centres moved from Fleet Street and Manchester since the 1980s

### The "Golden Age" of Newspapers (1860–1910)

- 📖 **Golden Age of Newspapers (报业黄金时代)**：Period from 1860 to 1910 when technical advances in printing and communication combined with professionalisation of journalism and new owners. It matters for understanding the rise of mass media in Britain.
  - Printing technology advances
  - Professionalisation of journalism (educated reporters, division of labour)
  - Literacy rate rise + advertising revenue
  - Partisan environment
  - Diversification of content (entertainment, sport)
  - Newspapers became more partisan
  - Rise of new / yellow journalism
  - Socialist and labour newspapers proliferated
  - *Daily Herald* (1912): first daily newspaper of the trade union and labour movement

### Types of Newspapers

- 📖 **Broadsheet (大报)**：Larger-format newspaper associated with more detailed political and economic coverage, intellectual and upmarket content. It matters for distinguishing British newspaper categories.
  - In-depth articles on political/social importance, reviews, "high culture"
  - Generally read by well-educated, middle-class audience
  - 📖 **The Times, The Guardian, The Daily Telegraph (英国三大报/"Big Three")**：Britain's three most prominent broadsheet newspapers. They matter as the benchmark of quality press.
- 📖 **Tabloid (小报)**：Smaller-format newspaper associated with shorter stories, big headlines, and more sensational topics (gossip, celebrities, crime, sport). It matters for understanding the downmarket end of British press.
  - Carry lots of crime, sport, sensational human-interest stories
  - "The gutter press" nickname
  - Some small-format papers claim higher standards and call themselves "compact" instead
- 📖 **Quality Press (严肃报纸/高端报纸)**：Newspapers emphasising serious news, analysis, and public affairs, often read by more educated, middle-class audiences. It matters for the cultural dimension of newspaper readership.
- 📖 **Popular Press (大众报纸/通俗报纸)**：Newspapers prioritising entertainment, sport, celebrity, scandal and human-interest stories, using simpler language and more pictures. It matters for understanding mass-market journalism.
  - ⚠️ Distinction between broadsheet/tabloid now often refers to style and content rather than physical size

### Circulation and Freedom

- Newspaper circulation relative to population is higher in Britain than any other developed country except Sweden
- About 60% of adult Britons read a national newspaper daily; more than 65% buy a Sunday newspaper
- No censorship — completely free to comment on matters of public interest, subject to law
- Papers almost always financially independent of any political party
- Not obliged to follow any specific party line
- ⚠️ Publishers can be prosecuted for insult if they deliberately tarnish reputation with fabricated stories

### 10.1.1 National Daily Newspapers

- 📖 **The Times (泰晤士报)**：Founded 1785 by John Walter as *The Daily Universal Register*; renamed 1788. It matters as one of the world's greatest and most respected newspapers.
  - John Walter II: pioneering Continental news from France; expanded from 4 to 12 pages
  - By mid-1800s: circulation grew from 5,000 (1815) to 40,000 (1850)
  - *The Sunday Times*: companion weekly since 1822
  - First to hire a war correspondent (William Howard Russell, Crimean War)
  - 1966: news permanently on front page (replacing advertisements)
  - 2004: switched to compact size
  - Politically: moderately centre-right; traditionally Conservative; supported Labour in 2001 and 2005
- 📖 **The Guardian (卫报)**：Founded 1821 as *The Manchester Guardian*; "Manchester" dropped 1959. It matters for its unique ownership (Scott Trust) and centre-left stance.
  - Owned by Scott Trust (via Guardian Media Group)
  - Stance: centre-left or radical; favourable to Liberal Party; closer to Labour
  - Formerly had reputation as "organ of the middle class"
- 📖 **The Daily Telegraph (每日电讯报)**：Founded 1855; the first penny paper in London. It matters as the market leader for broadsheets with the largest broadsheet circulation.
  - Circulation: 1,400,000 (including 300,000+ discount subscribers)
  - Feature: special war reporting since the 1860s (American Civil War)
  - UK's first national newspaper online: *Electronic Telegraph* (1994)
  - Politically: conservative; 64% of readers intended to support Conservative Party (MORI 2005)
  - Often referred to as the "Torygraph" (by *Private Eye*)
- 📖 **The Daily Mirror (每日镜报)**：Founded 1903 as a newspaper for women. It matters for its photo-rich tabloid format and large circulation.
  - Circulation: 4,400,000
  - Politically independent; caters for readers not much concerned with politics
- 📖 **The Sun (太阳报)**：Daily tabloid published in the UK and Ireland. It matters for its enormous circulation and political influence.
  - Launched by IPC to replace the failing *Daily Herald*
  - 1969: taken over by Rupert Murdoch (who already owned *News of the World*)
  - Supported Labour 1970; switched to Margaret Thatcher 1979 → ardent supporter
  - Circulation: 7,900,000 (second highest in world, biggest in UK)
  - 1978: surpassed *Daily Mirror* in circulation
- 📖 **Morning Star (晨星报)**：Communist British daily in tabloid format. It matters for representing the far-left press.
  - First appeared 1930 as *Daily Worker* (Communist Party of Great Britain); renamed 1966
  - Circulation: ~60,000 (doubled to 150,000 in past ten years)
  - Online version launched 2004; all content freely available since 2009

### 10.1.2 National Sunday Newspapers

- Dailies have no Sunday editions → gap filled by Sunday newspapers
- Also categorised as broadsheets and tabloids
- **Quality Sundays**: *The Observer* (1791), *The Sunday Times* (1822), *Sunday Telegraph* (1961), *The Independent on Sunday* (1990)
- **Tabloid Sundays**: *News of the World* (1843), *The People* (1881), *Sunday Express* (1918), *Sunday Mirror* (1963), *The Mail on Sunday* (1982)
- 📖 **News of the World (世界新闻报)**：Most popular Sunday tabloid; best-selling English-language newspaper in the world (3,445,459 copies/week in Oct 2006). It matters for its sensationalist style and ethical controversies.
  - Specialises in crime reports where sex is the focus
  - Nicknames: "News of the Screws", "Screws of the World"
  - Aggressive tactics; often involved in libel actions
- The Observer: world's oldest Sunday newspaper (1791); left-liberal; extensive arts, government, education coverage

### 10.1.3 Periodicals

- 📖 **Periodicals (期刊/杂志)**：A wide array from quarterlies to weeklies, scholarly journals to illustrated family magazines. Over 7,000 published in Britain. It matters for the diversity of the British press.
- 📖 **The Economist (经济学人)**：Weekly magazine, one of the world's prominent journals. It matters for its global coverage of news, politics and economy.
  - Right-wing in political attitude
  - Circulation: ~725,000; North America = about half
- 📖 **New Statesman (新政治家)**：Founded 1913 as a literary weekly. It matters for its aggressive, satirical political analysis.
  - Inclines towards left wing of Labour Party; independent socialist forum
- 📖 **Spectator (旁观者)**：Moderately conservative editorial stance. It matters for its critical reviews and essays on political, literary, and economic issues.

## 10.2 Radio and Television

- 📖 **Broadcasting (广播电视业)**：Radio and television, still vital entertainment despite challenge from online media. It matters for understanding Britain's public service broadcasting tradition.
- Three main companies: BBC, ITC (Independent Television Commission), Radio Authority
- All ultimately accountable to Parliament but virtually independent in business conduct
- Obligations: proper balance and wide range; impartiality in controversy; accuracy in news

### 10.2.1 Radio

- Over 250 radio stations; most prominent are BBC national networks
- 📖 **BBC Radio 1**：Mostly current pop music on FM and digital; live music throughout the year
- 📖 **BBC Radio 2**：UK's most listened-to station (12.9 million weekly listeners); popular music from last 5 decades
- 📖 **BBC Radio 3**：Classical music station; concerts and performances; jazz and world music at night
- 📖 **BBC Radio 4**：Current affairs and speech station; news, debate, radio drama
- 📖 **BBC Radio 5 Live**：24-hour live news and sports commentary; phone-in debates
- BBC also provides 40 local radio services
- Three national commercial channels: Absolute Radio, Classic FM, talkSPORT
- 📖 **Commercial Radio (商业电台)**：Licensed by Ofcom; "beauty contest" determines which station broadcasts in an area. Most local stations broadcast within 20–50 mile radius; predominant format is pop music.
  - Many owned by large radio groups (e.g., Global Radio, Bauer Radio, UTV Radio)
  - Global Radio owns Classic FM and 95.8 Capital FM
- 📖 **Community Radio (社区电台)**：Small-area (3-mile radius), mostly not-for-profit stations with volunteer broadcasters. Recognised under Communications Act 2003 as a distinct third tier.

### 10.2.2 Television

- British TV broadcasting started 1932 (BBC first programme) — first country with regular daily TV schedule
- Now almost 600 channels available
- Average 4 hours/day watching TV; most popular leisure pastime
- 📖 **Soap Opera (肥皂剧)**：One of the most popular TV genres, broadcast during prime time. UK soaps feature realistic accounts of working-class communities (unlike American focus on rich/famous). It matters for understanding British popular culture.
  - 📖 **Coronation Street (加冕街)**：Oldest and most watched show; setting in northern Manchester; began in 1960s. Flagship of ITV.
  - 📖 **EastEnders (东区人)**：First broadcast on BBC 1 (19 February 1985); set in fictitious east London Borough of Walford. 1986 Christmas Day episode: 30.15 million viewers (highest-rated UK soap episode ever). Flagship of BBC.
- 📖 **Broadcasting Act (广播法案)**：Designed to keep ownership widely spread, prevent concentration of media power; foreign ownership (outside EU) mainly prohibited. It matters for media plurality.

### 10.2.3 The BBC

- 📖 **BBC (British Broadcasting Corporation, 英国广播公司)**：The UK's main public broadcaster, founded 1927. It matters for its central role in British public service broadcasting and global influence.
  - Founded 1922 as private service radio station (British Broadcasting Company, Ltd.)
  - 1926 Crawford Committee: government worried broadcasting too important for market
  - John Reith (later Lord Reith): "Broadcasting must be conducted as a Public Service with definite standards"
  - 1927: became a public corporation
  - Held monopoly on British TV until 1954; radio until 1972
  - Reith as general manager (1922) and director general (1927–1938): developed radio, inaugurated shortwave broadcasting, introduced world's first regular TV service (1936)
  - TV interrupted by WWII; resumed 1946
  - 1964: second BBC channel established
  - 1967: regular colour TV service (first in Europe)
  - Television Act 1954 → commercial channel (IBA 1955) broke TV monopoly
  - 1970s: local commercial broadcasting broke radio monopoly
- 📖 **Royal Charter (皇家特许状)**：Constitutional document governing the BBC's mission, governance, and relationship with the state, reviewed every 10 years. It matters for protecting the BBC's public-service role.
  - Enables the Queen to appoint BBC Trust members
  - 📖 **BBC Trust (BBC信托)**：Independent 12-member panel including chairman, vice-chairman, and national governors for Scotland, Wales, and Northern Ireland. It matters for BBC governance.
  - 2007 Charter mission: "inform, educate and entertain"
  - Public purposes: sustaining citizenship; promoting education; stimulating creativity; representing the UK; bringing the world to the UK; emerging technologies
- 📖 **Licence Fee (电视许可证费)**：Fee charged to all owners of equipment capable of receiving live TV broadcasts, funding the BBC. It matters for BBC independence and debates about public funding.
  - £142.50 per year per household (as of April 2009)
  - Discount for black-and-white TV sets
  - All BBC channels and radio free of commercial advertisements
  - BBC closely related to government financially but independent in editorial decisions
- BBC networks: BBC 1 (broad appeal), BBC 2 (special interest, documentaries)
- Nicknames: "the Beeb" (from Peter Sellers, 1950s); "Auntie" ("Auntie knows best" attitude)
- BBC broadcasts in English and 43 other languages; global weekly audience: at least 140 million
- BBC is a multimedia business: TV shows, magazines, publishing, educational interests

### 10.2.4 The Independent Broadcasting Authority

- 📖 **IBA (Independent Broadcasting Authority, 独立广播管理局)**：Regulatory body for commercial TV and radio broadcasts. "Independent" indicated freedom from the BBC, not the government. It matters for understanding the regulation of British commercial broadcasting.
  - Came into existence via Sound Broadcasting Act 1972
  - Did not produce own programmes — provided by commercial programme companies
  - Main functions: regulate TV network, appoint companies, supervise programmes, control advertisements, operate transmitters
  - 1991: regulatory duties reassigned to ITC (Independent Television Commission) and Radio Authority
  - 📖 **ITV (Independent Television, 独立电视台)**：The oldest commercial TV network in Great Britain, authorised 1954 by selling airtime to advertisers. Renamed Channel 3 since Broadcasting Act 1990. It matters for providing the main alternative to BBC.
    - Operated by four companies providing regional Channel 3 services
    - Not owned by a single company
  - 📖 **Channel 4 (第四频道)**：First launched 1982 as a state-owned, commercially funded TV channel. It matters for innovative content and diverse audiences.
    - Commissioning programmes from independent producers
  - Communications Act 2003 → merger of ITC, Radio Authority, Oftel, Radiocommunications Agency → **Ofcom** (2003)

## 10.3 Digital Broadcasting

- 📖 **DAB (Digital Audio Broadcasting, 数字音频广播)**：Digital radio broadcasting standard in the UK. It matters for the transition from analogue to digital radio.
  - Development started from BBC test transmissions in 1990
  - Biggest digital radio network in the world: 103 transmitters, 2 national DAB ensembles, 48 regional/local ensembles
  - Broadcasting over 250 commercial and 34 BBC radio stations
  - New BBC digital stations: BBC 6 Music, BBC 1Xtra, BBC Radio 7, BBC Asian Network, BBC Radio 5 Live Sports Extra
  - BBC World Service also broadcast nationally on DAB
  - 87% population coverage; target 90%
  - First sold as car radios in 1997 (~£800)
  - 32.1% own DAB set; 58% access digital radio via set, TV, or Internet

### Digital Television

- 📖 **DTT (Digital Terrestrial Television, 数字地面电视)**：Established 15 November 1998, largely superseding analogue terrestrial television. It matters for the UK's digital TV transition.
  - Received via set-top box or Integrated Digital Television (IDTV)
  - Six multiplexes (groups): BBC has Multiplex 1; ITV and Channel 4 share Multiplex 2; Five and S4C share Multiplex A; B, C, D auctioned off
- New digital TV services: BBC Choice, BBC News 24, BBC Parliament
- ITV2 (launched 7 December 1998, 24 hours/day)
- Channel 4 digital channels: FilmFour, E4 (entertainment for ages 15–35)

## 10.4 News Agencies

- 📖 **News Agency (通讯社)**：Organisation supplying news reports to media outlets. In the UK, the major agencies are Reuters, the Press Association and Extel Financial. They matter for understanding news supply chains.

### Reuters

- 📖 **Reuters (路透社)**：One of the world's leading newswire services, founded by Paul Julius Reuter in 1851. It matters for its global reach and objectivity policy.
  - Built using electric telegraphy and carrier pigeons
  - First newspaper client: *Morning Advertiser* (1858)
  - 1960s: one of first to use computers for financial news
  - 1973: computer-terminal displays of foreign-exchange rates
  - 1981: electronic transactions over its network
  - 1984: Reuters Founders Share Company → protect independence and objectivity
  - 2008: merged with Thomson Corporation → Thomson Reuters
  - 10,335+ full-time staff; ~13,000 journalists and photographers; 200 cities in 94 countries
  - Strict objectivity policy: avoids the word "terrorist" except in quotes

### The Press Association

- 📖 **Press Association (PA, 报联社)**：The UK's national news agency, providing London-based news-collecting to almost all national and local newspapers, TV, radio, and websites. It matters for standardising UK news coverage.
  - Founded 1868 by provincial newspaper proprietors on a co-operative basis
  - Subsidiaries: Scottish Press Association, Press Association of Ireland
  - Produces 150–200 stories on weekdays
  - 70% of British news articles in five notable quality London newspapers are largely influenced by PA
  - Treated by BBC as "a confirmed, single source"

### Extel Financial

- 📖 **Extel Financial (Extel金融通讯社)**：London-based news agency supplying financial information. It matters for the financial news sector.
  - Originally established 1872 as Exchange Telegraph company
  - Laid first telegraphic cable on Atlantic seabed (London–New York)
  - Extel Cards (1922): brief data on profit, employees, business, management
  - Extel Survey (1974): collecting fund manager views on research analysts

## 10.5 Online Media

- 📖 **Online Media (在线媒体)**：Internet-based news and entertainment media. It matters for the transformation of traditional print and broadcast media.
  - Average UK citizen uses the Internet for 36 minutes every day (Ofcom 2007)
  - Almost all newspapers and magazines have online editions
  - Some local papers go fully online (e.g., *Southport Reporter*)
  - Over 350 British radio stations streaming online
  - 14.5 million people listened to radio online (2008); 9.4 million weekly
- 📖 **BBC Online / bbc.co.uk (BBC在线)**：Large network of websites including BBC News, BBC iPlayer, CBeebies, Bitesize. It matters for the BBC's digital expansion.
  - Launched 11 May 1994 as paid subscription service; renamed bbc.co.uk 2004
  - 📖 **BBC iPlayer (BBC播放器)**：Launched December 2007; allows users to download or stream radio and TV programmes up to seven days after broadcast. It matters for on-demand viewing.
  - Initially free from advertisements (funded by licence fee)
  - Complaints from other websites: impossible to compete with BBC's advertising-free content

## 10.6 Conclusion: Functions of News Media

- Supply weather forecasts, political/social information, advertisements, educational programmes
- Allow people to express opinions via interactive columns/programmes
- 📖 **Watchdog Function (监督功能)**：News media's role in keeping an eye on government and securing objectivity of reports and parliamentary democracy. It matters for understanding press power.
  - Names of dominant newspapers reflect this: *The Times*, *The Observer*, *The Guardian*
- Power to shape public opinion by focusing attention on some issues while ignoring others
- Media coverage increases national importance Britons ascribe to issues
- Powerful persuasive impact can be misleading and threaten liberal democracy
- Media bias makes it practically impossible for public to attain impartial perception
- Some argue press power has surpassed that of parliament
- Contemporary politicians prefer speaking directly to media rather than to parliament
- News media cultivate nationwide culture: shared contents, experiences, concerns regardless of regional differences

## Cross-disciplinary Connections

### Media × Politics

- **Political leanings of newspapers**: UK papers are not official party mouthpieces but have clear political outlooks
  - *The Guardian*: centre-left
  - *The Daily Telegraph*: centre-right Conservative
  - *The Sun*: high visibility campaigning; perceived ability to shape election narratives
- **BBC independence and licence fee controversy**: Impartiality defended by attracting complaints from both sides; licence fee defended as protecting from commercial pressures but criticised as outdated/regressive
- **Tabloid culture**: Catchy headlines, short stories, scandal/gossip/crime/sport — can widen access but also encourage superficiality, blur fact and opinion, amplify moral panics
- **Rupert Murdoch's impact**: Growth of highly commercial, competitive national press; debates about media concentration, cross-media power, agenda-setting

### Media × Culture

- **Fleet Street's historical significance**: Concentrated editorial decisions, political connections, and media labour in London; remains cultural shorthand for the press as an institution
- **Newspaper readership as cultural marker**: Class, region, education background influence newspaper choice — reading *The Times* vs *The Sun* signals different social identities
- **BBC as national institution**: "The Beeb" and "Auntie" nicknames reflect deep cultural embeddedness; mission to "inform, educate and entertain" shapes national culture
- **Television as leisure**: Average 4 hours/day; soap operas reflect working-class communities; programme conversations serve as social bonding

## Exam Focus

### Key Facts (高频填空)

- **130** daily and Sunday newspapers; **2,000+** weekly newspapers; **7,000+** periodicals
- **"Big Three"**: The Times, The Guardian, The Daily Telegraph
- **60%** of adult Britons read a national newspaper daily; **65%**+ buy a Sunday newspaper
- **1860–1910**: "golden age" of newspaper publication
- **The Observer** (1791): world's oldest national newspaper (Sunday)
- **The Times** (1785): Britain's oldest daily newspaper
- **Fleet Street**: traditional centre of British newspaper publishing
- **BBC full name**: British Broadcasting Corporation
- **BBC founded**: 1927 (as public corporation); 1922 (as private company)
- **BBC operates under**: Royal Charter (reviewed every 10 years)
- **BBC mission**: "inform, educate and entertain" (2007 Charter)
- **BBC TV monopoly**: until 1954 (Television Act → IBA → commercial TV)
- **BBC radio monopoly**: until 1972 (local commercial broadcasting permitted)
- **BBC Radio 4**: current affairs and speech
- **BBC Radio 2**: UK's most listened-to station
- **ITV**: oldest commercial TV network (1954); renamed Channel 3 (1990)
- **DAB**: Digital Audio Broadcasting; biggest digital radio network in the world
- **DTT**: Digital Terrestrial Television; established 15 November 1998
- **Reuters**: founded 1851; merged with Thomson 2008 → Thomson Reuters
- **Press Association**: founded 1868; produces 150–200 stories on weekdays
- **BBC iPlayer**: launched December 2007; download/stream up to 7 days after broadcast
- **No censorship** in Britain — press free to comment, subject to law
- **Official Secrets Act**: papers cannot reveal government information without permission
- **News of the World**: best-selling English-language newspaper in the world (Sunday)

### Linking Chains (简答题框架)

- **Chain 1**: 1513 earliest printed newspaper → 1785/1791 (The Times/The Observer) → 1860–1910 golden age (technology + professionalisation + literacy) → 1980s (moved from Fleet Street) → digital era (online editions)
- **Chain 2**: Broadsheet vs tabloid → quality vs popular press → political leanings → media–politics interdependence → watchdog function → shaping public opinion
- **Chain 3**: BBC (1922 private → 1927 public corporation) → Royal Charter → licence fee → monopoly (TV until 1954, radio until 1972) → commercial competition (ITV, Channel 4) → digital expansion (DAB, iPlayer)
- **Chain 4**: Press freedom (no censorship) → legal limits (libel, Official Secrets Act, contempt of court) → Press Complaints Commission → balance between freedom and accountability

### Ready-to-use Exam Sentences (可背写高分句型)

- **Britain's newspapers are traditionally categorised into quality papers (broadsheets) and popular papers (tabloids), differing in size, content depth, and readership.**
- **The BBC, founded as a public corporation in 1927, operates under a Royal Charter and is funded primarily by the television licence fee, which enables all its channels to be free of commercial advertisements.**
- **The British press is free from government censorship, but publishers can be prosecuted for libel if they deliberately publish fabricated stories that damage reputations.**
- **News media serve a watchdog function by keeping an eye on government and securing the objectivity of reports, but their power to shape public opinion can also be misleading and threaten liberal democracy.**
