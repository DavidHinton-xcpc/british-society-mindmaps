# British History (Ch2 + Ch3)

## Ch2: A Brief History (I) — Prehistory to 1688

### 2.1 Prehistoric & Pre-feudal Britain

- **Prehistoric Britain (before 55 BC)**
  - Ice Age ended c. 8000 BC → English Channel formed → Britain became an island
  - 📖 **Celts (凯尔特人)**：Iron Age peoples of Britain with related languages and cultures. They matter as key early inhabitants whose legacies survive in Welsh, Scottish Gaelic, and Irish identities and in resistance to Roman and later expansion.
  - 📖 **Beaker Folk (比克人)**：Prehistoric groups associated with Beaker pottery and early Bronze Age burial customs. They matter for showing migration and cultural change, including new technologies like metalworking in ancient Britain.
  - 📖 **Stonehenge (巨石阵)**：Prehistoric stone circle in Wiltshire built in stages (Neolithic/Bronze Age). It matters as evidence of complex early societies, ritual practice, and engineering skills in Britain before written history.
  - 📖 **Skara Brae (斯卡拉布雷)**：Neolithic village in Orkney, remarkably preserved. It matters for revealing everyday life, housing, and community organisation in prehistoric Britain.
  - ⚠️ Other important sites: Avebury (Wiltshire)

### 2.2 Roman Conquest (55 BC – AD 410)

- **Roman Invasion**
  - 📖 **Julius Caesar (凯撒)**：Roman general who led expeditions to Britain in 55–54 BC. He did not conquer Britain permanently, but his raids brought Britain into Rome's political orbit and prepared later Roman invasion narratives and contacts.
  - 📖 **Emperor Claudius (克劳狄乌斯)**：Roman emperor who ordered the successful conquest of Britain in AD 43. His decision began centuries of Roman rule, reshaping Britain through towns, roads, administration, and long-term cultural change.
  - 📖 **Queen Boudica (布狄卡女王)**：Queen of the Iceni who led a major revolt against Roman rule (AD 60/61), destroying Roman settlements. Her uprising mattered as the most serious early challenge to Roman control and later became a symbol of resistance.
  - 📖 **Emperor Hadrian (哈德良)**：Roman emperor who visited Britain and ordered Hadrian's Wall (c. AD 122). He mattered for defining and defending Rome's northern frontier, showing how Rome managed borders and military control in Britain.
- **Roman Conquest of Britain (AD 43)**：Invasion launched under Claudius that began Roman rule. It matters for integrating Britain into the Roman Empire, transforming infrastructure, economy, urban life, and governance.
- **Roman Legacy**
  - 📖 **Hadrian's Wall (哈德良长城)**：Roman frontier wall across northern England built under Hadrian. It matters as a symbol of Roman military control, boundary-making, and interaction between empire and local peoples.
    - 🌍 Location: Northern England, near the England–Scotland border
  - 📖 **Londinium (伦丁尼姆)**：Roman-founded town that became a major administrative and trading centre. It matters as the origin of London's long-term economic and political importance.
  - 📖 **Bath (Aquae Sulis 巴斯)**：Roman spa town built around hot springs. It matters as evidence of Roman urban culture in Britain and the blending of Roman and local religious practice.
  - Built 50+ cities; introduced Christianity; road network (best in Britain for 1,400 years)
- **Roman Withdrawal AD 410**：End of Roman imperial administration and legions in Britain. It matters because it created a power vacuum, enabling new kingdoms and migrations and marking the transition to post-Roman Britain.
  - Goths attacked Rome → Britain left unprotected → 600 years of warfare and fragmentation
  - 📖 **Canterbury (坎特伯雷)**：City in Kent, seat of the Archbishop of Canterbury. It matters as England's leading ecclesiastical centre after Augustine's mission, shaping English Christianity and church-state relations.

### 2.3 Anglo-Saxon Invasions (5th–6th c.)

- 📖 **Anglo-Saxons (盎格鲁-撒克逊人)**：Germanic settlers who formed kingdoms in post-Roman England. They matter for establishing early English language, law customs, and political structures that shaped medieval England.
  - Angles, Saxons, Jutes from Denmark region; pagans; abandoned Roman towns and laws
  - 📖 **Angle-land → England**：Named after the Angles
  - Celts driven westward into Wales and Cornwall
- 📖 **Heptarchy (七国时代)**：Traditional term for the seven main Anglo-Saxon kingdoms (e.g., Wessex, Mercia, Northumbria). It matters for describing early medieval political fragmentation and the slow emergence of a unified England.
  - Small tribes merged into seven/eight kingdoms
  - Jutes held Isle of Wight; Saxons established Wessex; Angles ruled Mercia, East Anglia, Northumbria

### 2.4 Danish/Viking Invasions (8th–11th c.)

- 📖 **Vikings / Danes (维京人/丹麦人)**：Scandinavian raiders, traders, and settlers active from the late 8th century. They matter for reshaping politics through conquest and settlement, influencing culture and place-names, and prompting English unification efforts.
  - 📖 **Lindisfarne (林迪斯法恩)**：Monastic centre in Northumbria, raided by Vikings in 793. It matters as a symbol of early English Christianity and as a landmark event marking Viking impact on Britain.
  - 📖 **York/Jorvik (约克)**：Major northern city; "Jorvik" was its Viking name and centre of Scandinavian power. It matters for showing Viking urban life and trade, and York's enduring regional importance.
  - 📖 **Danelaw (丹麦法区)**：Area of England under Viking (Danish) law and settlement, mainly in the north and east. It matters for showing Scandinavian influence on English society, place-names, and political development.
- 📖 **Alfred the Great (阿尔弗雷德大帝)**：King of Wessex (r. 871–899) who resisted Viking invasion and promoted learning and law. He mattered for strengthening Wessex, laying foundations for a more unified England and for English identity.
  - 878 Edington victory → forced Guthrum to accept baptism and territorial division
  - Pioneered English prose literature (translated Latin books)
  - Commissioned **Anglo-Saxon Chronicle (盎格鲁-撒克逊编年史)**：First historical record of England
- 📖 **Canute (克努特)**：Danish king who ruled England (r. 1016–1035) as part of a North Sea empire. He mattered for demonstrating successful Viking kingship in England and for stabilising rule through cooperation with English institutions.
  - 1042 Danish dynasty ended → Edward the Confessor succeeded

### 2.5 Norman Conquest & Feudalism (1066)

- 📖 **Norman Conquest (诺曼征服, 1066)**：One of the most important dates in English history
  - 📖 **Edward the Confessor (忏悔者爱德华)**：King of England (r. 1042–1066), associated with Westminster Abbey and later sainthood. His childless death triggered the 1066 succession crisis, leading directly to the Norman Conquest.
  - 📖 **William I / William the Conqueror (征服者威廉)**：Duke of Normandy who became king after conquering England in 1066. He mattered for transforming England's ruling elite, landholding, and governance, introducing Norman feudal structures and strengthening royal authority.
  - 📖 **Harold II (哈罗德二世)**：Last Anglo-Saxon king of England, crowned in 1066 and killed at Hastings. He mattered because his contested claim and defeat enabled Norman rule and a major political and social reordering.
  - 📖 **Battle of Hastings (黑斯廷斯战役)**：William of Normandy defeated Harold II and secured the English crown. It matters as the decisive event of the Norman Conquest, reshaping England's ruling class, language, and institutions.
    - 🌍 Location: Senlac Hill near Hastings, Sussex
    - Harold killed by arrow through the eye → William victorious
  - 📖 **Westminster Abbey (威斯敏斯特大教堂)**：Historic church in London used for coronations and royal burials. It matters as a key symbol of monarchy, national ceremony, and political legitimacy.
- **Impact of the Norman Conquest**
  - 📖 **Normans (诺曼人)**：People from Normandy of Viking origin who conquered England in 1066. They matter for transforming England's aristocracy, castles, church organisation, language influence, and stronger central governance.
  - 📖 **Feudalism / Feudal System (封建制度)**：Medieval system where land was held in exchange for loyalty and military service, forming a hierarchy from king to lords to knights. It matters for organising power, landholding, and obligations after the Norman Conquest.
    - 📖 **Fief (封地)**：Land granted by a lord to a vassal in return for service and loyalty. It matters because it was the core unit of feudal relationships, linking military duty to land and shaping medieval wealth and authority.
    - 📖 **Serfs / Villeins (农奴)**：Unfree peasants bound to a lord's manor, owing labour and dues. They matter for showing the social hierarchy of medieval England and for conflicts over labour rights, especially after the Black Death.
  - 📖 **Domesday Book (末日审判书, 1086)**：William I's survey of landholding and resources in England. It matters for taxation and control, and as a key record of Norman governance and medieval society.
    - Called "Domesday" because no one could escape its judgement
  - Norman French blended with Anglo-Saxon → enriched English vocabulary
  - Stone churches and abbeys replaced wooden structures

### 2.6 Plantagenet Dynasty & Constitutional Origins

- 📖 **Plantagenet Dynasty (金雀花王朝)**：Royal line ruling England (1154–1485), including Henry II to Richard III. It matters for state-building, common law growth, wars with France, and evolving Parliament-monarchy relations.
- 📖 **Henry II (亨利二世)**：King of England (r. 1154–1189), founder of the Angevin empire, who reformed royal justice. He mattered for developing common law and stronger royal courts, shaping English legal and governmental traditions.
  - Established **Common Law (普通法)**：Legal system based on court judgments and precedent, developed through royal courts. It matters for creating a unified legal framework in England and for influencing later legal traditions across the world.
- 📖 **Magna Carta (大宪章, 1215)**：Charter limiting royal abuses and asserting legal rights of "free men." It matters as a foundational text for rule of law ideas and later constitutional claims against arbitrary power.
  - 📖 **King John (约翰王)**：King of England (r. 1199–1216) whose military failures and taxation provoked baronial revolt. He mattered because conflict with the nobility led to Magna Carta, limiting royal power in principle.
  - 🌍 **Runnymede (兰尼米德)**：Meadow by the Thames where Magna Carta was agreed in 1215. It matters as a symbolic birthplace of limits on royal authority and later constitutional traditions.
  - Core principle: The king must govern according to law; free men have certain rights
  - ⚠️ Constitutional seed: "the king is subject to law"
- **Rise of Parliament**
  - 📖 **Simon de Montfort (蒙特福特)**：Nobleman who led baronial opposition to Henry III and summoned a parliament in 1265. He mattered for advancing representative government by including knights and burgesses, influencing later parliamentary development.
  - 📖 **Edward I (爱德华一世)**：King of England (r. 1272–1307), lawmaker and conqueror in Wales, who summoned the "Model Parliament" (1295). He mattered for strengthening royal administration and helping institutionalise parliamentary representation.
    - 📖 **Model Parliament (模范议会, 1295)**：Edward I's assembly including nobles, clergy, knights, and burgesses. It matters as a key step in representative government, shaping the later structure of Parliament.
    - Origin of **House of Commons (下议院)**：Lower chamber of Parliament representing constituencies, historically knights and burgesses, now elected MPs. It matters because it became central to taxation and legislation, eventually dominating British political power.

### 2.7 Hundred Years' War & Consequences

- 📖 **Hundred Years' War (百年战争, 1337–1453)**：Series of conflicts between England and France over succession and territory. It matters for strengthening national identities, changing warfare, and straining English finances and politics.
  - 📖 **Henry V (亨利五世)**：King of England (r. 1413–1422) who won Agincourt (1415) in the Hundred Years' War. He mattered for temporarily reviving English claims in France and for becoming a symbol of martial kingship.
  - 📖 **Agincourt (阿金库尔, 1415)**：Site of Henry V's 1415 victory in France. It matters for English military mythology and as a high point of English success in the Hundred Years' War.
  - 📖 **Joan of Arc (圣女贞德)**：French peasant visionary who led forces against the English during the Hundred Years' War and was executed in 1431. She mattered for boosting French resistance and helping shift momentum away from English control in France.
  - 📖 **Calais (加来)**：English-held port in northern France until 1558. It matters as England's last major continental possession, central to trade, war, and the decline of English claims in France.
  - Impact: English national identity strengthened; financial pressure → parliamentary power grew
- 📖 **Black Death (黑死病, 1348–1350)**：Plague that killed a large share of the population. It matters for causing labour shortages, social mobility pressures, economic change, and tensions that contributed to later unrest.
  - Over 1/4 of England's population perished
  - Labour shortage → serfs demanded higher wages → feudal bonds loosened
  - 📖 **Statute of Laborers (劳工法令)**：Law (1351) fixing wages and restricting worker movement after the Black Death. It matters for showing state attempts to control labour markets and for fuelling resentment leading to social unrest.
  - 📖 **Wat Tyler (瓦特·泰勒)**：Leader of the Peasants' Revolt (1381) against poll taxes and serfdom. He mattered as a symbol of popular protest, exposing tensions after the Black Death and challenging medieval social hierarchy.
  - 📖 **Peasants' Revolt (农民起义, 1381)**：Uprising against taxation and serfdom, reaching London. It matters for exposing deep social conflict and influencing gradual changes in labour relations and the decline of serfdom.
- 📖 **Wars of the Roses (玫瑰战争, 1455–1485)**：Dynastic civil wars between Lancastrians and Yorkists. It matters for weakening the nobility and paving the way for stronger Tudor monarchy after 1485.
  - 📖 **House of Lancaster (兰开斯特家族)**：Branch of the Plantagenets claiming the throne in the Wars of the Roses (Red Rose). It matters for dynastic conflict culminating in Henry VII's accession, shaping Tudor legitimacy.
  - 📖 **House of York (约克家族)**：Rival Plantagenet branch in the Wars of the Roses, producing kings like Edward IV and Richard III (White Rose). It matters for the civil war's instability and for the dynastic claims resolved by Tudor victory.
  - 📖 **Battle of Bosworth Field (博斯沃思战役, 1485)**：Henry Tudor defeated Richard III and became Henry VII. It matters for ending Plantagenet rule and beginning Tudor consolidation of power.
    - 🌍 Location: Leicestershire
  - 📖 **Henry VII (亨利七世)**：First Tudor king (r. 1485–1509), victor at Bosworth Field. He mattered for ending the Wars of the Roses, restoring stability, and strengthening royal finances and authority, founding the Tudor dynasty.
  - Impact: Feudal nobility destroyed; new capitalist gentry rose

### 2.8 Tudor Period

- 📖 **Tudor Dynasty (都铎王朝)**：English royal house (1485–1603) from Henry VII to Elizabeth I. It matters for ending civil war, centralising monarchy, and transforming religion through the Reformation.
- **Henry VIII & the English Reformation**
  - 📖 **Henry VIII (亨利八世)**：Tudor king (r. 1509–1547) who broke with Rome and made himself head of the Church of England. He mattered for triggering the English Reformation and major religious, political, and economic change.
  - 📖 **English Reformation (英国宗教改革, 1534)**：Break with the Papacy, formalised by Henry VIII's supremacy over the Church. It matters for creating the Church of England and reshaping religion, politics, and property.
  - 📖 **Act of Supremacy (至尊法案, 1534)**：Law making Henry VIII Supreme Head of the Church of England. It matters for formalising the break with Rome and placing religion under royal authority.
  - Break with Roman Catholicism → **Protestantism (新教)** established
  - 📖 **Dissolution of the Monasteries (解散修道院, 1536–1539)**：Closure and confiscation of monastic institutions under Henry VIII. It matters for transferring wealth and land to the crown and elites, changing local welfare and religious life.
- 📖 **Elizabeth I (伊丽莎白一世, 1558–1603)**：Tudor queen who established a Protestant settlement and faced threats including the Spanish Armada. She mattered for consolidating religious compromise, enhancing national identity, and supporting cultural flourishing.
  - Religious middle course: restored Protestant service, retained Catholic features
  - 📖 **Spanish Armada (西班牙无敌舰队, 1588)**：Failed Spanish invasion fleet defeated by English forces and weather. It matters for boosting English Protestant confidence, naval identity, and longer-term rivalry with Spain.
    - Established English naval supremacy → exploration and colonisation
  - 📖 **East India Company (东印度公司, 1600)**：Chartered trading company that became a major territorial power in India. It matters for driving British imperial expansion, shaping colonial governance, and prompting later state control after abuses and rebellion.
  - 📖 **Elizabethan Age (伊丽莎白时代)**：Period of Elizabeth I's reign (1558–1603). It matters for religious settlement, naval rivalry with Spain, early imperial ventures, and major cultural achievements in literature and theatre.
    - 📖 **William Shakespeare (莎士比亚, 1564–1616)**：English playwright and poet whose works defined Elizabethan and Jacobean drama. He mattered for shaping English literature and language, and for reflecting political, social, and cultural themes of early modern England.
  - 📖 **Renaissance (文艺复兴)**：European cultural movement emphasising classical learning, humanism, and new art/science (c. 14th–16th centuries). It matters in Britain for stimulating education, literature, and changes in intellectual and religious life.

### 2.9 Stuart Period & the Bourgeois Revolution

- 📖 **Stuart Dynasty (斯图亚特王朝)**：Royal house ruling England/Scotland (1603–1714, with interruption). It matters for conflicts over sovereignty and religion leading to civil war, revolution, and constitutional monarchy.
- **James I (詹姆斯一世, 1603–1625)**
  - 📖 **Divine Right of Kings (君权神授)**：Belief that monarchs derive authority directly from God and are accountable only to Him. It matters for justifying Stuart absolutist claims and provoking conflict with Parliament and constitutional ideas.
  - 📖 **Gunpowder Plot (火药阴谋, 1605)**：Catholic conspiracy to destroy Parliament and kill James I. It matters for intensifying anti-Catholic politics and strengthening the state's security and surveillance.
    - 📖 **Guy Fawkes (盖伊·福克斯)**：Catholic conspirator involved in the Gunpowder Plot (1605) to blow up Parliament. He mattered as a lasting symbol of religious conflict and state security, remembered in Bonfire Night traditions.
    - 📖 **Bonfire Night / Guy Fawkes Night (篝火之夜)**：Annual 5 November commemoration of the failure of the Gunpowder Plot. It matters as a lasting cultural tradition reflecting Protestant state identity, political memory, and public ritual.
  - 📖 **King James Version (詹姆斯国王版圣经, 1611)**：Authorised English translation of the Bible under James I. It matters for shaping Protestant worship and profoundly influencing English language, literature, and culture.
- **Charles I & the English Civil War (1642–1649)**
  - 📖 **Charles I (查理一世)**：Stuart king (r. 1625–1649) whose conflicts with Parliament led to civil war. He mattered because his execution ended the idea of unquestionable monarchy and prompted constitutional change.
  - 📖 **English Civil War (英国内战, 1642–1649)**：War between Parliament and Charles I over sovereignty and religion. It matters for ending in regicide, challenging monarchy, and accelerating constitutional change.
  - 📖 **Roundheads (圆颅党)**：Nickname for Parliamentarians in the Civil War, associated with Puritans and short haircuts. They matter as the political-military force that defeated Charles I and enabled constitutional transformation.
  - 📖 **Cavaliers (骑士党)**：Nickname for Royalists supporting Charles I in the Civil War. They matter for representing traditional monarchy and aristocratic loyalty, central to the conflict over sovereignty.
  - 📖 **Battle of Naseby (奈斯比战役, 1645)**：Decisive Parliamentarian victory over royalists. It matters because it effectively secured Parliament's military triumph and led to Charles I's eventual defeat.
  - 📖 **Oliver Cromwell (克伦威尔)**：Parliamentary commander and later Lord Protector who ruled during the Commonwealth. He mattered for defeating royalists, reshaping governance without a king, and leaving a controversial legacy of military rule and religious policy.
  - 📖 **Execution of Charles I (查理一世被处决, 1649)**：Public beheading of the king after trial by Parliament's supporters. It matters as a radical break with monarchy, legitimising the idea rulers can be removed for tyranny.
  - 1649 → **Commonwealth (共和国)**：Republic declared after Charles I's execution (1649–1660), later dominated by Cromwell. It matters as Britain's main experiment without monarchy, reshaping politics, religion, and constitutional debate.
- **Cromwell & the Restoration**
  - 📖 **Lord Protector (护国公)**：Title held by Oliver Cromwell as head of state (1653–1658). It matters for showing the quasi-monarchical nature of republican rule and the role of the army in governance.
  - 1658 Cromwell died → 1660 **Restoration (王政复辟, 1660)**：Return of the monarchy with Charles II after the Commonwealth. It matters for resetting governance, but with lasting suspicion of royal power and continued growth of parliamentary influence.
  - 📖 **Charles II (查理二世)**：King restored in 1660 after the Commonwealth. He mattered for the Restoration settlement, balancing monarchy and Parliament, and for political developments that influenced later constitutional monarchy.
  - 📖 **Tories (托利党)** and **Whigs (辉格党)**：First major political parties
    - Tories: Political grouping emerging in the late 17th century, favouring monarchy, Church of England, and tradition. They matter as a foundation of modern Conservatism and of Britain's party system.
    - Whigs: Political grouping supporting parliamentary power, Protestant succession, and limits on monarchy. They matter for shaping constitutional monarchy after 1688 and developing ideas of liberty and government by Parliament.
- 📖 **Glorious Revolution (光荣革命, 1688)**：Deposition of James II and accession of William and Mary. It matters for confirming parliamentary control over succession and for establishing a constitutional monarchy framework.
  - 📖 **James II (詹姆斯二世)**：Catholic king (r. 1685–1688) whose policies alarmed Protestants and Parliament. He mattered because his deposition in the Glorious Revolution established limits on monarchy and affirmed Protestant succession.
  - 📖 **William III / William of Orange (威廉三世)**：Dutch prince who became king after the Glorious Revolution (1688), ruling with Mary II. He mattered for accepting parliamentary constraints, fighting Louis XIV, and strengthening constitutional monarchy.
  - 📖 **Mary II (玛丽二世)**：Daughter of James II who co-ruled with William III after 1688. She mattered as part of the settlement legitimising the Glorious Revolution and reinforcing Protestant, parliamentary government.
  - 📖 **Bill of Rights (权利法案, 1689)**：Statute setting limits on monarchy and affirming parliamentary rights after 1688. It matters for establishing key constitutional principles: regular parliaments, lawful taxation, and protection against royal overreach.
    - No taxation or standing army without Parliament's consent
    - Guaranteed free speech, free elections, frequent parliamentary sessions
  - ⚠️ True beginning of constitutional monarchy; parliamentary sovereignty replaced royal sovereignty

## Ch3: A Brief History (II) — Industrial Revolution, Chartist Movement & Parliamentary Reform

### 3.1 The Industrial Revolution (late 18th–19th c.)

- 📖 **Industrial Revolution (工业革命)**：Period of rapid technological, economic, and social change driven by mechanisation, factories, and new energy sources (late 18th–19th centuries). It matters for creating modern industrial society, class relations, and global economic power.
- **Why Britain first**
  - Internal waterways and canals; no physical barriers to trade
  - Coal and iron deposits conveniently located
  - Commercial banks provided financing
  - Agricultural advances freed labour
- **Textile-led Industrialisation**
  - 📖 **Spinning Jenny (珍妮纺纱机, 1765)**：Multi-spindle spinning machine associated with Hargreaves. It matters for massively increasing yarn production, accelerating textile industrialisation and encouraging factory-based production.
    - 📖 **James Hargreaves (哈格里夫斯)**：Inventor of the Spinning Jenny (c. 1760s), a multi-spindle spinning machine. He mattered for accelerating textile production, helping drive factory growth and the Industrial Revolution.
  - 📖 **Flying Shuttle (飞梭)**：Invention (John Kay, 1733) that sped up weaving by allowing a shuttle to move quickly across a loom. It matters for boosting textile productivity and driving demand for more spun thread, pushing mechanisation.
  - Cotton became Britain's most important product
- **Steam Power**
  - 📖 **James Watt (瓦特)**：Engineer who improved the steam engine, making it more efficient and adaptable. He mattered for providing a powerful energy source for industry, mining, and transport, central to industrialisation.
    - 📖 **Steam Engine (蒸汽机, 1784)**：Improved steam engine design enabling efficient rotary power for factories. It matters as a key energy technology of industrialisation, reducing reliance on water power and expanding industrial location choices.
  - 📖 **Abraham Darby (达比)**：Ironmaster who pioneered using coke to smelt iron (early 1700s). He mattered for enabling cheaper, larger-scale iron production, supporting machinery, railways, and industrial expansion.
  - By 1850 English manufacturers produced over half the world's iron
- **Railway Revolution**
  - 📖 **George Stephenson (史蒂芬森)**：Railway engineer who developed successful steam locomotives, including the Rocket. He mattered for making rail transport practical and transformative, linking industrial regions and speeding economic change.
    - 📖 **Rocket Locomotive (火箭号机车, 1829)**：Winning locomotive at the Rainhill Trials, proving reliable high-speed steam rail travel. It matters for accelerating railway adoption and revolutionising transport, trade, and mobility.
  - 📖 **Manchester–Liverpool Railway (曼彻斯特-利物浦铁路, 1830)**：First modern inter-city passenger railway using steam locomotives. It matters for linking industrial centres, cutting travel times, transforming commerce, and symbolising the transport revolution.
  - Railways transformed concepts of speed and distance
- **Impact of Industrialisation**
  - 📖 **Free Trade (自由贸易)**：Policy of reducing tariffs and barriers to imports and exports. It matters for Britain's 19th-century economic strategy, lowering food costs after Corn Law repeal and supporting industrial export-led growth.
  - 📖 **Urbanisation (城市化)**：Movement of people from rural areas to towns and cities. It matters for explaining industrial-era social change: overcrowding, public health issues, new labour politics, and transformed family and work patterns.
    - 1801–1851: Liverpool and Manchester grew by 1,000%
    - 📖 **Manchester (曼彻斯特)**：Industrial city central to cotton manufacturing. It matters as a key site of industrialisation, urban growth, and later working-class politics, including Peterloo.
    - 📖 **Liverpool (利物浦)**：Major port city linked to Atlantic trade and industry. It matters for Britain's commercial expansion, migration, and connections to empire and, historically, the slave economy.
    - By 1850: urban population = half of England's total
  - 📖 **Laissez-faire (自由放任)**：Economic idea that markets function best with minimal government intervention. It matters for shaping 19th-century British industrial policy debates and responses to poverty, labour conditions, and free trade.
  - Working-class misery: 12–18 hour days, starvation wages, widespread child labour
  - 📖 **Luddites (卢德分子)**：Early 19th-century workers who attacked machinery they believed threatened jobs and wages. They matter for highlighting social costs of industrialisation and early labour resistance to economic change.
  - 📖 **Peterloo Massacre (彼得卢屠杀, 1819)**：Cavalry attack on a peaceful reform meeting in Manchester. It matters for exposing repression and accelerating demands for political reform and wider representation.
    - 🌍 Location: Manchester
    - 50,000–60,000 demanded reform → cavalry attacked → 11 killed, 400+ injured
    - Galvanised support for the labour movement

### 3.2 Social Movements & Parliamentary Reform

- 📖 **Chartist Movement (宪章运动, 1837–1848)**：Mass working-class campaign for political rights based on the People's Charter. It matters for popularising democratic demands and influencing later reforms, despite immediate failures.
  - 📖 **People's Charter (人民宪章, 1838)**：Chartist programme demanding universal male suffrage, secret ballot, and other reforms. It matters as a clear democratic blueprint that influenced later electoral changes.
  - 1.25 million signatures on petition → Parliament rejected it
  - Movement dissolved, but all demands (except annual elections) eventually became law
- **Reform Acts**
  - 📖 **Great Reform Act (大改革法案, 1832)**：Electoral reform reducing "rotten boroughs" and extending the vote to more middle-class men. It matters for modernising representation and beginning a wider process of democratisation.
  - 📖 **Reform Act of 1867 (1867年改革法案)**：Law extending the vote to many urban working-class men. It matters for accelerating mass politics and forcing parties to organise nationally to appeal to wider electorates.
    - 📖 **Benjamin Disraeli (迪斯雷利)**：Conservative politician and Prime Minister who promoted imperial policy and social reform. He mattered for shaping modern Conservatism, expanding the franchise (1867), and popularising "imperial" national identity.
  - 📖 **Reform Act of 1884 (1884年改革法案)**：Law extending voting rights further, especially to rural men, and standardising constituencies. It matters for moving Britain closer to democratic suffrage and strengthening representative legitimacy.
- **Free Trade**
  - 📖 **Anti-Corn Law League (反谷物法联盟)**：Campaign organisation (1830s–1840s) advocating repeal of the Corn Laws. It matters for mobilising middle-class political pressure, advancing free trade ideology, and influencing major economic policy change.
  - 📖 **Corn Laws (谷物法)**：Tariffs and restrictions on imported grain (1815–1846). They mattered for keeping food prices high, benefiting landowners, provoking urban protest, and driving debates over free trade and industrial society.
  - 📖 **Robert Peel (皮尔)**：Conservative statesman and Prime Minister who founded the modern police and repealed the Corn Laws. He mattered for reforming governance and shifting Britain towards free trade and modern party politics.

### History × Politics: Parliamentary Power Expansion Chain

- **Magna Carta (1215)** → Royal power constrained by law and consultation
- **Model Parliament (1295)** → Representation and tax consent institutionalised
- **Tudor "strong monarchy"** → Parliament habitually legitimised royal policy
- **Stuart conflicts** → Parliament asserted consent required; king not above law
- **Civil War (1642–1651)** → Parliamentary supremacy became practical reality
- **Commonwealth/Protectorate** → Proved monarchy not inevitable
- **Glorious Revolution (1688)** → Legitimate rule depends on parliamentary acceptance
- **Bill of Rights (1689)** → Legal control over taxation, legislation, regular sessions
- **Reform Acts (1832/1867/1884)** → Expanded electorate; strengthened democratic legitimacy

### History × Culture: Historical Roots of Cultural Phenomena

- **Class Consciousness (阶级意识)**
  - Feudalism normalised hierarchy → Industrial Revolution created new classes (bourgeoisie vs proletariat) → Chartism = working-class political awakening
- **Weather Talk (对天气话题的偏爱)**
  - Changeable maritime climate → shared daily uncertainty → easy "neutral" topic
  - Seafaring nation → weather mattered for travel, fishing, naval power
- **Bonfire Night (篝火之夜)**
  - 1605 Gunpowder Plot → memory of religion–politics conflict
  - Annual bonfires and effigies → reinforces loyalty to state and Parliament
- **Conservativeness (保守性)**
  - Gradual compromise (not revolutionary breaks) → trust in tradition and incremental reform
  - Stable legal system and class order → rewarded caution
- **Self-deprecating Humour (自嘲式幽默)**
  - "Not taking yourself too seriously" → reduces social tension
  - Class-conscious culture → indirectness safer than confrontation
