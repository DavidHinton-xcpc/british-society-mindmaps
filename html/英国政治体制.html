# Political System (Ch4)

## 4.1 Constitutional Monarchy

- 📖 **Constitutional Monarchy (君主立宪制)**：A form of government in which a monarch acts as head of state within the perimeters of a constitution, unlike absolute monarchy where the monarch is the sole source of political power. It matters as the framework of British government since 1689.
  - The monarch does not govern day-to-day; real executive power is exercised by elected government
  - 📖 **"The Queen reigns, but does not rule" (统而不治)**：The country is governed in the name of the sovereign but in practice by Her Majesty's Government. It matters as the central principle of the British system.
  - Examples: Australia, Belgium, Canada, Denmark, Japan, Netherlands, Norway, Spain, Sweden, UK

### The Monarch

- 📖 **Sovereign / Monarch (君主)**：The head of state, theoretical source of executive, judicial and legislative power. Currently Queen Elizabeth II. It matters as the formal but constrained apex of the British constitution.
  - Sovereignty no longer rests with the monarch since the Bill of Rights (1689) established Parliamentary sovereignty
  - Possesses many formal powers: choose PM, call/dissolve Parliament, grant Royal Assent
  - In practice: PM is leader of largest party in Commons; Parliament dissolved at PM's suggestion
  - 📖 **Royal Assent (御准)**：The monarch's formal approval for a bill to become law. Queen Anne was the last monarch to withhold it (1708). It matters as a constitutional formality now always granted.
  - 📖 **Royal Prerogative (皇家特权)**：Historic executive powers formally held by the Crown but usually exercised by ministers (especially PM) in the sovereign's name. Examples: appointing ministers, declaring war. It matters for understanding the gap between formal and actual power.
- **Three essential rights of the monarch**
  - The right to be consulted
  - The right to advise
  - The right to warn
  - PM holds weekly confidential meetings with the monarch
- Monarch serves as final check on executive power (could theoretically decline Royal Assent if law threatened freedom of citizens)
- Commander-in-chief of the armed forces (oath of allegiance to the monarch)

### The Constitution

- 📖 **Uncodified Constitution (不成文宪法)**：A constitution not contained in a single written document, formed by statutes, common law, conventions, and royal prerogatives. It matters for understanding why Britain's constitution evolves gradually rather than being "set" in one text.
  - "Unwritten" is a misnomer — most of the constitution exists in written form (statutes, court judgments, treaties)
  - Also includes parliamentary conventions and royal prerogatives
  - 📖 **Parliamentary Sovereignty (议会主权)**：The principle that Parliament is the supreme law-making authority and can make or unmake any law. No other body can override an Act of Parliament. It matters as the bedrock of the British constitution.
    - Parliament can change the constitution simply by passing new Acts
    - Some debate about whether this remains entirely valid (EU membership influence)
  - 📖 **Acts of Parliament (议会法案)**：Statutes passed by Parliament, the UK's supreme and final source of law. They matter as the primary constitutional source.

## 4.2 Three Branches of Power

### 4.2.1 Executive

- 📖 **Executive Power (行政权)**：Exercised by the UK Government, with the PM as de facto source of executive authority. It matters for understanding who actually governs Britain.
  - The PM is the de facto source of executive authority
  - Government is drawn from and answerable to Parliament
  - A vote of no confidence forces government to resign or seek dissolution

#### The Prime Minister and the Cabinet

- 📖 **Prime Minister (PM, 首相)**：The head of government, responsible for chairing Cabinet meetings, selecting Cabinet ministers, and formulating government policy. It matters as the most powerful political figure in Britain.
  - De facto source of executive authority, exercising executive functions nominally vested in the sovereign
  - Historically emerged under the Hanoverian monarchs (George I's limited English → reliance on ministers)
  - 📖 **Robert Walpole (罗伯特·沃波尔)**：Often treated as the first de facto Prime Minister because he coordinated ministers and controlled Commons support. It matters for the origins of the PM system.
  - Theoretically "primus inter pares" (first among equals) among Cabinet colleagues
  - Exercises royal prerogative powers (declaring war, certain foreign affairs)
- 📖 **Cabinet (内阁)**：The central decision-making body of senior ministers led by the PM. It matters as the core of executive governance.
  - Consists of ~20 most senior government ministers (Secretaries of State)
  - Approximately 100 ministers total comprise the government
  - Cabinet meetings typically held weekly when Parliament is in session
  - All ministers must be Members of Parliament or peers in the House of Lords
- 📖 **Civil Service (文官)**：Permanent, politically neutral officials who implement government policy. It matters for ensuring continuity of governance regardless of which party is in power.
  - Senior civil servants remain in post upon change of Government
  - Led by a Permanent Secretary in each department
  - "Whitehall" = synonym for the central Civil Service (headquarters in and around the former Royal Palace Whitehall)

### 4.2.2 Legislature

- 📖 **Parliament (议会)**：The supreme legislative body of the United Kingdom, bicameral in structure. It matters as the institution of parliamentary sovereignty.
  - 📖 **Bicameral (两院制)**：Having two chambers — House of Commons and House of Lords. It matters for understanding the structure of British legislative power.

#### House of Commons

- 📖 **House of Commons (下议院)**：The elected lower chamber of Parliament, composed of MPs from parliamentary constituencies. It matters as the dominant chamber controlling taxation, spending, and government formation.
  - Each constituency elects a Member of Parliament (MP)
  - 650 constituencies (increasing from 646)
  - All PMs and Leaders of the Opposition have been drawn from the Commons since 1963
  - One party usually has a majority due to FPTP electoral system
  - 📖 **MP (Member of Parliament, 议员)**：An elected representative in the House of Commons. It matters as the basic unit of parliamentary representation.
  - First chance to indicate confidence: vote on the Speech from the Throne

#### House of Lords

- 📖 **House of Lords (上议院)**：The unelected upper chamber of Parliament, consisting of Lords Temporal and Lords Spiritual. It matters for its role in revising and scrutinising legislation.
  - 📖 **Lords Temporal (世俗议员)**：Appointed life peers and 92 remaining hereditary peers. It matters for understanding the modern composition of the Lords.
  - 📖 **Lords Spiritual (宗教议员)**：26 Church of England bishops, including the Archbishops of York and Canterbury. It matters as a unique feature of the British legislature.
  - Power: review legislation, propose amendments, exercise suspensive veto (delay up to 12 months)
  - Cannot veto money bills or major manifesto promises (Salisbury Convention)
  - Parliament Acts 1911 and 1949 limit the Lords' power
  - 📖 **Parliament Act 1911 (1911年议会法)**：Law sharply limiting the Lords' ability to block bills, especially money bills. It matters for establishing the supremacy of the elected Commons.
  - Formerly the final court of appeal for civil cases (Law Lords) → replaced by Supreme Court (Constitutional Reform Act 2005)

#### Electoral System

- 📖 **First Past the Post (FPTP, 简单多数制)**：An electoral system where the candidate with the most votes in a constituency wins, even without an absolute majority. It matters for maintaining the two-party system and favouring larger parties.
  - Tends to produce disproportional results
  - Creates current two-party dominance
  - 📖 **Constituency (选区)**：A geographical area represented by one MP. Parliamentary Boundary Commissions ensure broadly equal population.
  - 📖 **General Election (大选)**：National election for the House of Commons. The monarch commissions the winner to form a government.
  - 📖 **By-election (补选)**：An election held between general elections to fill a vacancy in a constituency.
  - 📖 **Coalition Government (联合政府)**：A government formed by two or more parties sharing power when no party has a clear majority. It matters for understanding exceptions to single-party rule.

### 4.2.3 Judiciary

- 📖 **Judiciary (司法部门)**：The judiciary is independent of the executive and legislature, though the UK has no single legal system due to its political union of previously independent countries. It matters for understanding Britain's complex legal structure.
  - Three distinct systems: English law, Northern Ireland law, Scots law
  - 📖 **Supreme Court (最高法院)**：Created under the Constitutional Reform Act 2005, replacing the Law Lords as the highest court. It matters for the separation of powers.
  - 📖 **Common Law (普通法)**：Law made by judges sitting in courts, applying precedent and common sense to facts. It matters for the basis of the English legal system.
  - 📖 **Stare Decisis (遵循先例)**：The legal principle that courts should follow established precedents when deciding similar cases. It matters for consistency and predictability in law.
- **England, Wales and Northern Ireland**
  - Based on common-law principles
  - Courts headed by the Supreme Court of Judicature (Court of Appeal + High Court of Justice + Crown Court)
- **Scotland**
  - 📖 **Scots Law (苏格兰法律)**：A hybrid system based on both common-law and civil-law principles. It matters for Scotland's distinct legal identity.
  - Court of Session (civil); High Court of Justiciary (criminal)
  - 49 sheriff courts across six Sheriffdoms

## 4.3 The Party System

- 📖 **Political Party System (政党制度)**：The UK is a multi-party system dominated by two main parties since the 1920s (Conservative and Labour), with the Liberal Democrats as the third largest. It matters for understanding British governance and electoral politics.

### Conservative Party (Tories)

- 📖 **Conservative Party (保守党)**：The centre-right party tracing origins to 1662, associated with lesser gentry and the Church of England. It matters as one of the two dominant parties in British politics.
  - Name "Tories" from the Exclusion Bill crisis of 1678–1681
  - Originally opposed excluding the Catholic Duke of York from the throne
  - Transformed under Robert Peel's "Tamworth Manifesto" (1834): reforming ills while conserving the good
  - Margaret Thatcher (leader 1975) → economic neoliberalism → privatization, anti-trade-unionism, Monetarism
  - "Thatcherism" = market liberalization + strong state
  - Won 2010 election in coalition with Liberal Democrats (David Cameron as PM)

### Labour Party

- 📖 **Labour Party (工党)**：The centre-left party originating from the Labour Representation Committee (1900), representing trade union and working-class interests. It matters for the rise of mass democratic politics.
  - Replaced the Liberal Party as main opposition to Conservatives after WWI
  - First true victory: 1945 "khaki election" after WWII
  - "Wilderness years": 1951–1964, 1979–1997
  - Tony Blair (leader 1994) → "New Labour" → loosened union links → landslide 1997
  - Some said Labour morphed from democratic socialist to social democratic party

### Liberal Democrats

- 📖 **Liberal Democrats (自由民主党)**：The third largest party, formed in 1988 by merger of the Liberal Party and Social Democratic Party. It matters as a potential coalition partner and advocate for electoral reform.
  - Origin traces to the Whigs and Rochdale Radicals
  - "Liberal Party" first used officially in 1868
  - Seeks reform of FPTP electoral system
  - Coalition with Conservatives from 2010 (Nick Clegg as Deputy PM)

### Other Parties

- 📖 **Scottish National Party (SNP, 苏格兰民族党)**：Pro-independence party in Scotland, won Scottish general election in 2007. It matters for devolution and the independence debate.
- 📖 **Plaid Cymru (威尔士党)**：Welsh nationalist party, junior coalition partner in Welsh Assembly Government. It matters for Welsh devolution.
  - Does not officially advocate complete secession from the UK
- 📖 **Sinn Féin (新芬党)**：Largest pro-Belfast Agreement party in Northern Ireland, advocates unification with the Republic of Ireland. It matters for Northern Ireland politics.
  - Abstains from taking elected seats at Westminster (refuses oath of allegiance to monarch)

## 4.4 Devolution

- 📖 **Devolution (权力下放)**：The transfer of certain legislative and executive powers from the UK Parliament to devolved institutions in Scotland, Wales, and Northern Ireland. It matters for understanding the modern UK political structure.
  - NOT full sovereignty: Parliament legally remains supreme
  - Growing support for "Nationalist" parties led to proposals in 1970s; devolution actually happened in 1990s

### Devolved Bodies

- 📖 **Scottish Parliament (苏格兰议会)**：Devolved legislature in Edinburgh with powers over domestic matters including education, health, and justice. It matters for Scotland's distinct political identity.
  - SNP won 2007 election; formed minority government
- 📖 **Welsh Assembly / Senedd (威尔士议会)**：Devolved body with varying degrees of legislative authority. It matters for Welsh self-government.
  - Plaid Cymru as junior coalition partner
- 📖 **Northern Ireland Assembly (北爱尔兰议会)**：Devolved legislature in Belfast. It matters for power-sharing between unionist and nationalist communities.

### Nationalist Movements

- Scottish National Party advocates full independence referendum
- Plaid Cymru does not officially advocate complete secession
- Sinn Féin advocates Northern Ireland's unification with the Republic of Ireland

## 4.5 Westminster System

- 📖 **Westminster System (威斯敏斯特体制)**：The British parliamentary system of government, adopted by many former British Empire countries. It matters for understanding Britain's global political influence.
  - Adopted by: Canada, India, Australia, New Zealand, Singapore, Malaysia, Jamaica
  - Features: constitutional monarchy, parliamentary sovereignty, PM and Cabinet, bicameral legislature, independent judiciary

## Cross-disciplinary Connections

### Politics × History: How the PM System Took Shape

- After 1689, ministers increasingly ran day-to-day government
- Under the Hanoverian kings (especially George I's limited English), reliance on ministers grew
- Robert Walpole = first de facto PM (coordinated ministers, controlled Commons)
- Over time, PM became the effective executive, assuming day-to-day functioning away from the sovereign

### Politics × History: Evolution of Party System

- **Whigs and Tories** → loose groupings around constitutional and religious disputes
- Tories developed into the **Conservative Party** in the 19th century (Peel's "Tamworth Manifesto")
- Whig tradition fed into liberal politics
- **Labour rose from trade union/working-class movement** with industrial society and mass voting
- **Liberal Democrats** = later product of realignment and merger in liberal/centrist tradition

### Politics × History: Weakening of the House of Lords

- Democratic legitimacy shifted toward the elected Commons over time
- **Parliament Act 1911** → sharply limited Lords' power to block bills
- **House of Lords Act 1999** → reduced hereditary element
- Reinforced the idea that the Commons is the primary source of political authority

### History × Politics: Parliamentary Power Expansion Chain

- **Magna Carta (1215)** → Royal power constrained by law
- **Model Parliament (1295)** → Representation and tax consent institutionalised
- **Tudor "strong monarchy"** → Parliament habitually legitimated royal policy
- **Stuart conflicts** → Parliament asserted consent required
- **Civil War (1642–1651)** → Parliamentary supremacy became practical reality
- **Glorious Revolution (1688)** → Legitimate rule depends on parliamentary acceptance
- **Bill of Rights (1689)** → Legal control over taxation, legislation, regular sessions
- **Reform Acts (1832/1867/1884)** → Expanded electorate; strengthened democratic legitimacy

## Exam Focus

### Key Terms for Fill-in-the-blank

- **Head of state** = the Monarch; **Head of government** = the Prime Minister
- **Bill of Rights (1689)** established Parliamentary sovereignty
- **Uncodified constitution** = no single written document
- **The PM is the de facto source of executive authority**
- **Parliament is bicameral**: House of Commons + House of Lords
- **MP** = Member of Parliament (elected to the Commons)
- **House of Lords** was previously a largely hereditary aristocratic chamber
- **FPTP** = First Past the Post electoral system
- **Devolution** = transfer of powers to Scotland, Wales, Northern Ireland
- **Scotland** has a Parliament; **Wales and Northern Ireland** have Assemblies
- **Conservative Party** origins: 1662 (Tories)
- **Labour Party** origins: 1900 (Labour Representation Committee)
- **Liberal Democrats** formed: 1988 (merger of Liberal Party + SDP)

### Linking Chains (简答题框架)

- **Chain 1**: Magna Carta (1215) → constitutional constraints on monarchy → Civil War + Commonwealth → Glorious Revolution (1688) → Bill of Rights (1689) → constitutional monarchy → PM system developed under Hanoverians
- **Chain 2**: FPTP electoral system → favours larger parties → two-party dominance (Conservative + Labour) → coalition only in national emergencies (2010 = first since WWII)
- **Chain 3**: Parliamentary sovereignty → Parliament can make/unmake any law → constitution evolves through Acts of Parliament → "weak separation of powers" (executive drawn from legislature)
- **Chain 4**: Nationalist movements → devolution proposals (1970s) → actual devolution (1990s) → Scottish Parliament, Welsh Assembly, NI Assembly → debate over full independence

### Ready-to-use Exam Sentences (可背写高分句型)

- **The UK is a parliamentary constitutional monarchy: the monarch is the head of state, while the Prime Minister is the head of government.**
- **The Queen reigns, but does not rule: the country is governed in the name of the sovereign but in practice by Her Majesty's Government.**
- **The UK constitution is uncodified and has grown up gradually through countless Acts of Parliament and constitutional conventions.**
- **The UK is often described as having a weak separation of powers because the executive is drawn from, and depends on, Parliament.**
- **Parliamentary sovereignty, established by the Bill of Rights of 1689, means that Parliament is the supreme law-making authority and can make or unmake any law.**
